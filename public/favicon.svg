<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2535"/>
      <stop offset="100%" style="stop-color:#0f1923"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Left footprint -->
  <g transform="translate(120, 80) scale(0.75)" fill="url(#accent)">
    <!-- Sole -->
    <path d="M80 280c-30 0-55 20-60 50-5 35 5 75 30 100 20 20 50 25 70 15 25-15 35-45 25-75-10-45-35-90-65-90z" opacity="0.9"/>
    <!-- Toes -->
    <ellipse cx="45" cy="255" rx="22" ry="30" transform="rotate(-10 45 255)"/>
    <ellipse cx="90" cy="238" rx="20" ry="28" transform="rotate(5 90 238)"/>
    <ellipse cx="132" cy="245" rx="18" ry="25" transform="rotate(15 132 245)"/>
    <ellipse cx="165" cy="265" rx="15" ry="22" transform="rotate(25 165 265)"/>
  </g>
  <!-- Right footprint (offset, smaller = perspective/trail) -->
  <g transform="translate(230, 20) scale(0.6)" fill="url(#accent)" opacity="0.5">
    <path d="M80 280c-30 0-55 20-60 50-5 35 5 75 30 100 20 20 50 25 70 15 25-15 35-45 25-75-10-45-35-90-65-90z"/>
    <ellipse cx="45" cy="255" rx="22" ry="30" transform="rotate(-10 45 255)"/>
    <ellipse cx="90" cy="238" rx="20" ry="28" transform="rotate(5 90 238)"/>
    <ellipse cx="132" cy="245" rx="18" ry="25" transform="rotate(15 132 245)"/>
    <ellipse cx="165" cy="265" rx="15" ry="22" transform="rotate(25 165 265)"/>
  </g>
</svg>
